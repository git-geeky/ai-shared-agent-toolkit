steps:
  test:
    image: python:3.12-slim
    commands:
      - python -m compileall -q .
      - python -m unittest discover -s tests -v
      - python - <<'PY'
        import json
        from pathlib import Path
        for path in Path('.').rglob('*.json'):
            json.loads(path.read_text(encoding='utf-8'))
        PY

